<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
{
"imports": {
"vue": "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js"
},
"integrity": {
"https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js": "sha384-Q3gg1uvxzo7j5a5zJyKw57OkLMyOhl1sGmQxxn63S3lsr8Ki3ACSKKSvK8zG//7D"
}
}
</script>
    <script type="module" src="app.js"></script>
</head>

<body>
    <div id="app">
        <header-component></header-component>

        <table>
            <thead>
                <tr is="vue:weeks-component"></tr>
                <tr is="vue:days-component"></tr>
            </thead>

            <tbody>
                <tr is="vue:row-component" v-for="person in craftsmen" :key="person.name" :name="person.name"
                    :img="person.img" :schedule="person.schedule"></tr>
            </tbody>
        </table>
        
        <button-component></button-component>

        <availability-component></availability-component>

        <occupations-component></occupations-component>
    </div>
</body>

</html>
